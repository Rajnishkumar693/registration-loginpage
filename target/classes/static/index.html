<!DOCTYPE html>
<html>
<head>
    <title>Signup Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="box">
    <h2>Signup</h2>

    <form id="signupForm">

        <input type="text"
               id="name"
               placeholder="Enter Name"
               required>

        <input type="email"
               id="email"
               placeholder="Enter Email"
               required>

        <input type="text"
               id="mobile"
               placeholder="Enter Mobile"
               required>

        <input type="password"
               id="password"
               placeholder="Enter Password"
               required>

        <button type="submit">
            Signup
        </button>

    </form>
</div>

<script src="script.js"></script>

</body>
</html>
